<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOZ TEAM Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #0a0e17);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --tg-hint: var(--tg-theme-hint-color, #94a3b8);
            --card-bg: rgba(26, 34, 53, 0.85);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ff3d71;
            --accent-secondary: #6c5ce7;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--tg-bg);
            color: var(--tg-text);
            line-height: 1.5;
            min-height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .container { max-width: 480px; margin: 0 auto; padding: 12px; }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 0 12px; border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .logo { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        .logo-icon { font-size: 1.3rem; }

        .tabs {
            display: flex; gap: 4px; margin-bottom: 16px;
            background: var(--card-bg); padding: 3px; border-radius: var(--radius);
        }
        .tab-btn {
            flex: 1; padding: 10px 8px; border: none; border-radius: 10px;
            background: transparent; color: var(--tg-hint); font-weight: 600; font-size: 0.85rem;
            cursor: pointer;
        }
        .tab-btn.active { background: var(--accent); color: white; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 12px; margin-bottom: 10px;
        }
        .card h3 { font-size: 1rem; margin-bottom: 6px; color: var(--success); }
        .card p { color: var(--tg-hint); font-size: 0.9rem; line-height: 1.5; }
        .card a { color: var(--accent); text-decoration: none; font-weight: 600; }

        .city-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .city-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
        }
        .city-card.active {
            border-color: var(--accent);
            background: rgba(255, 61, 113, 0.1);
        }
        .city-icon { font-size: 1.5rem; margin-bottom: 4px; }
        .city-name { font-weight: 700; font-size: 0.85rem; }
        .city-count { font-size: 0.7rem; color: var(--tg-hint); margin-top: 2px; }

        /* Location cards */
        .loc-wrapper {
            margin-bottom: 8px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--card-bg);
        }
        .loc-card {
            padding: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .loc-card:active { background: rgba(255,255,255,0.05); }
        
        .loc-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; flex-shrink: 0;
        }
        .loc-info { flex: 1; min-width: 0; }
        .loc-info h4 { font-size: 0.95rem; margin-bottom: 2px; }
        .loc-info .coords { font-size: 0.75rem; color: var(--tg-hint); font-family: monospace; }
        
        .loc-arrow {
            font-size: 1.2rem;
            color: var(--tg-hint);
            transition: transform 0.3s;
        }
        .loc-wrapper.expanded .loc-arrow { transform: rotate(180deg); }

        /* Expanded details */
        .loc-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .loc-wrapper.expanded .loc-details {
            max-height: 800px;
        }
        .loc-details-inner {
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
        }

        .detail-row { margin-bottom: 10px; }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-label {
            font-size: 0.75rem;
            color: var(--tg-hint);
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .detail-text { font-size: 0.9rem; line-height: 1.4; color: var(--tg-text); }
        .author-link { color: var(--accent); font-weight: 600; text-decoration: none; }

        .coords-box {
            background: rgba(255, 61, 113, 0.1);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            margin: 8px 0;
        }

        .btn-small {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 4px;
        }

        /* ===== NEW STATS CARDS STYLE ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin: 8px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 6px 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .stat-value.low { color: #2ecc71; }
        .stat-value.medium { color: #f39c12; }
        .stat-value.high { color: #e74c3c; }
        .stat-value.unknown { color: var(--tg-hint); }
        .stat-label-wrap {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.78rem;
            color: var(--tg-hint);
        }
        .stat-label-wrap .stat-icon {
            font-size: 1rem;
            line-height: 1;
        }
        .stat-desc {
            font-size: 0.7rem;
            color: var(--tg-hint);
            line-height: 1.2;
            margin-top: 2px;
        }

        .info-box {
            border-left: 3px solid var(--warning) !important;
            background: rgba(245, 158, 11, 0.05) !important;
            text-align: center;
        }
        .info-box h3 { color: var(--warning) !important; }

        @media (prefers-color-scheme: light) {
            :root {
                --tg-bg: #ffffff;
                --tg-text: #000000;
                --card-bg: #f8f9fa;
                --border: #e5e7eb;
            }
            .stat-card {
                background: #f0f0f0;
                border-color: #ddd;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo"><span class="logo-icon">🏙️</span> DOZ TEAM</div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="history">📜 История</button>
            <button class="tab-btn" data-tab="coords">📍 Координаты</button>
        </div>

        <div id="history" class="tab-content active">
            <div class="card">
                <h3>📅 Как всё начиналось</h3>
                <p>Я просто гулял с друзьями, и один из них предложил залезть на девятиэтажку. Мы очень боялись, но всё-таки решились.</p>
                <p>Первое видео на <a href="#" onclick="tg.openLink('https://www.tiktok.com/@0ian4ik0'); return false;">TikTok</a> было снято 28 сентября.</p>
            </div>
        </div>

        <div id="coords" class="tab-content">
            <div class="city-grid">
                <div class="city-card active" data-city="all">
                    <div class="city-icon">🌍</div>
                    <div class="city-name">Все города</div>
                    <div class="city-count" id="countAll">7</div>
                </div>
                <div class="city-card" data-city="frankovsk">
                    <div class="city-icon">🏔️</div>
                    <div class="city-name">Ивано-Франковск</div>
                    <div class="city-count" id="countFrankovsk">3</div>
                </div>
                <div class="city-card" data-city="nikolaev">
                    <div class="city-icon">⚓</div>
                    <div class="city-name">Николаев</div>
                    <div class="city-count" id="countNikolaev">4</div>
                </div>
            </div>

            <div id="locationsList"></div>

            <div class="card info-box">
                <h3>⚠️ Добавить объект</h3>
                <p>Напишите <a href="#" onclick="tg.openLink('https://t.me/ianqe'); return false;">@ianqe</a></p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        if (tg.colorScheme === 'light') {
            document.documentElement.style.setProperty('--tg-bg', '#f8f9fa');
            document.documentElement.style.setProperty('--tg-text', '#111827');
            document.documentElement.style.setProperty('--card-bg', '#ffffff');
            document.documentElement.style.setProperty('--border', '#e5e7eb');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // === PARSE HELPERS ===
        // entry/security/preservation stored as "X/10 — description"
        function parseStat(str) {
            const match = str.match(/^([\d?\/]+)\s*[—–\-]?\s*(.*)/);
            if (!match) return { level: '?', text: str };
            return { level: match[1], text: match[2] || '' };
        }

        function getStatClass(level) {
            if (level === '?') return 'unknown';
            const num = parseInt(level);
            if (num <= 3) return 'low';
            if (num <= 6) return 'medium';
            return 'high';
        }

        // === DATA ===
        const locations = [
            {
                id: 1, name: "Хлебокомбинат", city: "frankovsk",
                coords: "48.890714, 24.747582",
                desc: "Заброшенный хлебокомбинат. Много электроники и приборов.",
                location: "Село Хриплин, стоянка Пресмаш",
                entry: "2/10 — Через окно либо дверь",
                security: "9/10 — Много ЧОПа и камер",
                preservation: "6/10 — Интересное место",
                author: "@ianqe"
            },
            {
                id: 2, name: "Хз че за об'єкт", city: "frankovsk",
                coords: "48.931920, 24.696256",
                desc: "Есть лут и компы. Университет Нефти и Газа.",
                location: "Территория университета",
                entry: "3/10 — Пролаз в огромных красных дверях",
                security: "0/10 — Бухой охранник, пропускает",
                preservation: "4/10",
                author: "@ianqe"
            },
            {
                id: 3, name: "Баян ББ", city: "frankovsk",
                coords: "48.930520764272394, 24.706174750936114",
                desc: "Бомбарь (нужно перелезть через забор). Нет лута.",
                location: "20 улица Довга",
                entry: "6/10 — Лестница на 2 конце 'гриба'",
                security: "4/10 — Есть ЧОП",
                preservation: "8/10 — Только маски",
                author: "@ianqe"
            },
            {
                id: 4, name: "Под дом (1)", city: "nikolaev",
                coords: "46.968934, 31.969452",
                desc: "Заброшка под жилым домом.",
                location: "Николаев",
                entry: "4/10 — Стоит замок (можно пробивать через щель)",
                security: "3/10 — Очень много людей",
                preservation: "?/10",
                author: "@FOSFORNAYA_KISLOTA"
            },
            {
                id: 5, name: "Пять вентшахт", city: "nikolaev",
                coords: "46.967763, 31.965294",
                desc: "Система вентиляционных шахт.",
                location: "Николаев",
                entry: "4/10 — Несколько заварены и одна завалена",
                security: "1/10 — Очень мало людей",
                preservation: "?/10",
                author: "@FOSFORNAYA_KISLOTA"
            },
            {
                id: 6, name: "Под дом (2)", city: "nikolaev",
                coords: "46.972876043922, 32.00108239121922",
                desc: "Пространство под домом.",
                location: "Николаев",
                entry: "?/10",
                security: "?/10",
                preservation: "?/10",
                author: "@FOSFORNAYA_KISLOTA"
            },
            {
                id: 7, name: "Под здание мин. обучения", city: "nikolaev",
                coords: "46.97187082725983, 31.987964647643892",
                desc: "Под зданием Министерства образования.",
                location: "Николаев",
                entry: "?/10",
                security: "2/10 — Прохожие",
                preservation: "?/10",
                author: "@FOSFORNAYA_KISLOTA"
            }
        ];

        let currentCity = 'all';
        let expandedId = null;

        document.querySelectorAll('.city-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.city-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentCity = card.dataset.city;
                expandedId = null;
                renderLocations();
            });
        });

        function renderLocations() {
            const list = document.getElementById('locationsList');
            list.innerHTML = '';
            
            const counts = { all: locations.length, frankovsk: 0, nikolaev: 0 };
            locations.forEach(l => { if(counts[l.city] !== undefined) counts[l.city]++; });
            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countFrankovsk').textContent = counts.frankovsk;
            document.getElementById('countNikolaev').textContent = counts.nikolaev;

            const filtered = currentCity === 'all' ? locations : locations.filter(loc => loc.city === currentCity);
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="card" style="text-align:center;color:var(--tg-hint);padding:20px;">Нет локаций</div>';
                return;
            }

            const icons = { frankovsk: '🏔️', nikolaev: '⚓' };
            
            filtered.forEach(loc => {
                const isExpanded = expandedId === loc.id;
                const authorClean = loc.author.replace('@', '');
                const e = parseStat(loc.entry);
                const s = parseStat(loc.security);
                const p = parseStat(loc.preservation);

                const wrapper = document.createElement('div');
                wrapper.className = 'loc-wrapper' + (isExpanded ? ' expanded' : '');
                
                wrapper.innerHTML = `
                    <div class="loc-card" onclick="toggleLocation(${loc.id})">
                        <div class="loc-icon">${icons[loc.city] || '📍'}</div>
                        <div class="loc-info">
                            <h4>${loc.name}</h4>
                            <div class="coords">${loc.coords}</div>
                        </div>
                        <div class="loc-arrow">▼</div>
                    </div>
                    <div class="loc-details">
                        <div class="loc-details-inner">
                            <div class="detail-row">
                                <div class="detail-label">📝 Описание</div>
                                <div class="detail-text">${loc.desc}</div>
                            </div>
                            <div class="detail-row">
                                <div class="detail-label">📍 Где</div>
                                <div class="detail-text">${loc.location}</div>
                            </div>

                            <!-- STATS CARDS - New Style -->
                            <div class="detail-row">
                                <div class="detail-label">📊 Характеристики</div>
                                <div class="stats-row">
                                    <div class="stat-card">
                                        <div class="stat-value ${getStatClass(e.level)}">${e.level}</div>
                                        <div class="stat-label-wrap">
                                            <span class="stat-icon">🚪</span> Залаз
                                        </div>
                                        ${e.text ? `<div class="stat-desc">${e.text}</div>` : ''}
                                    </div>
                                    <div class="stat-card">
                                        <div class="stat-value ${getStatClass(s.level)}">${s.level}</div>
                                        <div class="stat-label-wrap">
                                            <span class="stat-icon">👮</span> Охрана
                                        </div>
                                        ${s.text ? `<div class="stat-desc">${s.text}</div>` : ''}
                                    </div>
                                    <div class="stat-card">
                                        <div class="stat-value ${getStatClass(p.level)}">${p.level}</div>
                                        <div class="stat-label-wrap">
                                            <span class="stat-icon">🏚️</span> Сохран
                                        </div>
                                        ${p.text ? `<div class="stat-desc">${p.text}</div>` : ''}
                                    </div>
                                </div>
                            </div>

                            <div class="detail-row">
                                <div class="detail-label">🎯 Координаты</div>
                                <div class="coords-box">${loc.coords}</div>
                                <button class="btn-small" onclick="event.stopPropagation(); openMap('${loc.coords}')">🗺️ Открыть в картах</button>
                            </div>

                            <div class="detail-row" style="text-align:right; margin-top:8px; border-top:1px solid var(--border); padding-top:8px;">
                                <span style="font-size:0.8rem; color:var(--tg-hint);">✍️ Автор: </span>
                                <a class="author-link" href="https://t.me/${authorClean}" onclick="event.stopPropagation(); tg.openLink(this.href); return false;">${loc.author}</a>
                            </div>
                        </div>
                    </div>
                `;
                
                list.appendChild(wrapper);
            });
        }

        function toggleLocation(id) {
            expandedId = expandedId === id ? null : id;
            renderLocations();
        }

        function openMap(coords) {
            const clean = coords.replace(/\s/g, '');
            const [lat, lng] = clean.split(',');
            tg.openLink(`https://maps.google.com/?q=${lat},${lng}`);
        }

        renderLocations();
    </script>
</body>
</html>
