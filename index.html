<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Mini App</title>
</head>
<body>
  <h1>Моя Telegram Mini App 🚀</h1>

  <button onclick="sendData()">Натиснути</button>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function sendData() {
      tg.sendData("Привіт з міні апки!");
    }
  </script>
</body>
</html>
